services:
  signalling-server:
    build:
      context: .
      dockerfile: packages/signalling-server/Dockerfile
    # To use a pre-built image from GHCR instead of building locally, comment
    # out the build block above and uncomment the line below:
    # image: ghcr.io/peterddod/react-p2p/signalling-server:latest
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
